<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor de memorización Pro Max</title>
    <style>
        :root { --color-rec: #17a2b8; --color-prod: #ffc107; --color-dom: #dc3545; --bg-light: #f8f9fa; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; background-color: #e9ecef; color: #333; }
        .contenedor { max-width: 1200px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .cabecera-controles { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #eee; flex-wrap: wrap; gap:10px;}
        .controles-izq { display: flex; gap: 15px; align-items: center; flex-wrap: wrap;}
        select, button, input[type="text"], textarea { padding: 10px; font-size: 16px; border: 1px solid #ced4da; border-radius: 6px; }
        button { cursor: pointer; background: #0056b3; color: white; border: none; font-weight: bold; transition: transform 0.1s, background 0.2s; }
        button:hover { background: #004494; }
        button:active { transform: scale(0.95); }
        button:disabled { background: #ccc; cursor: not-allowed; color: #666; transform: none;}
        #btn-reintentar { background: #28a745; }
        #btn-reintentar:hover:not(:disabled) { background: #218838; }
        
        /* Layout Principal */
        .layout-principal { display: grid; grid-template-columns: 350px 1fr; gap: 25px; }
        
        /* Panel de Fases (Izquierda) */
        .panel-fases { display: flex; flex-direction: column; gap: 15px; max-height: 700px; overflow-y: auto; padding-right: 10px; }
        .columna-fase { background: var(--bg-light); padding: 15px; border-radius: 8px; border-left: 5px solid #ccc; margin-bottom: 10px;}
        .columna-fase.rec { border-left-color: var(--color-rec); }
        .columna-fase.prod { border-left-color: var(--color-prod); }
        .columna-fase.dom { border-left-color: var(--color-dom); }
        .columna-fase h3 { margin-top: 0; font-size: 1.1em; color: #495057; border-bottom: 1px solid #ddd; padding-bottom: 5px;}
        
        .btn-tecnica { display: block; width: 100%; margin-bottom: 6px; text-align: left; background: #fff; color: #495057; border: 1px solid #dee2e6; font-size: 0.85em; font-weight: normal; padding: 8px; border-radius:4px;}
        .btn-tecnica:hover { background: #e2e6ea; padding-left: 12px; }
        .btn-tecnica.activo { font-weight: bold; background: #e2e6ea; border-left: 4px solid #333; color: #000; }

        /* Área de Trabajo (Derecha) */
        #area-trabajo { padding: 30px; border: 2px dashed #adb5bd; border-radius: 8px; min-height: 400px; font-size: 1.3em; background-color: #fff; position: relative; overflow: hidden; display:flex; flex-direction:column; scroll-margin-top: 20px;}
        #cita-actual { font-size: 1.3em; font-weight: bold; color: #0056b3; background: #eef; padding: 10px 15px; border-radius:6px; margin:0;}
        
        /* Elementos UI del Juego */
        .hud-juego { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 0.9em; font-weight: bold; background:#333; color:white; padding:10px; border-radius:6px;}
        .barra-tiempo { width: 100%; height: 10px; background: #eee; border-radius: 5px; overflow: hidden; margin-bottom: 15px; }
        .barra-tiempo-fill { height: 100%; background: #28a745; width: 100%; transition: width 0.1s linear, background 0.3s; }
        
        .cita { font-weight: 600; margin-bottom: 8px; color: #2c3e50; font-size: 0.95em; border-bottom: 2px solid #f0f0f0; padding-bottom: 5px; }
        .texto { line-height: 1.6; color: #444; font-size: 1.1em; }
        textarea.zona-escritura { width: 100%; height: 120px; margin-top: 15px; resize: vertical; box-sizing: border-box; font-size:16px !important;}
        input[type="text"] { font-size: 16px !important; }
        .correcto { color: #28a745; font-weight: bold; }
        .incorrecto { color: #dc3545; font-weight: bold; }
        
        .palabra-draggable { display: inline-block; padding: 8px 12px; margin: 5px; background: #e9ecef; border-radius: 4px; cursor: pointer; user-select: none; border: 1px solid #ccc; transition: all 0.1s;}
        .palabra-draggable:active { transform: scale(0.9); background:#d0d0d0;}
        .zona-drop { min-height: 80px; border-bottom: 3px solid #ccc; margin-bottom: 15px; padding-bottom: 10px; background: #f8f9fa; border-radius: 6px 6px 0 0;}
        .feedback-banner { margin-top: 15px; padding: 15px; border-radius: 6px; text-align: center; display: none; font-size: 1.1em; animation: popIn 0.3s ease-out;}
        
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        /* Efectos Especiales */
        .espejo { transform: scaleX(-1); display: inline-block; direction: rtl; }
        .interferencia-bg { animation: cambioFondo 0.5s infinite alternate; }
        .interferencia-blur { filter: blur(3px); transition: filter 0.2s; }
        .interferencia-blur:hover { filter: blur(0px); }
        .ruido-visual { position: absolute; background: rgba(0,0,0,0.9); width: 100%; height: 15px; animation: barrido 1s infinite linear; pointer-events: none; z-index: 50; }
        @keyframes cambioFondo { 0% { background: #fff; } 100% { background: #ffebeb; } }
        @keyframes barrido { 0% { top: -10%; } 100% { top: 110%; } }

        /* Memorama 3D */
        .grid-memorama { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; perspective: 1000px; }
        .carta-mem { position: relative; width: 100%; aspect-ratio: 4/3; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .carta-mem.flipped { transform: rotateY(180deg); }
        .carta-mem.matched { visibility: hidden; transition: visibility 0s 0.5s, opacity 0.5s; opacity:0;}
        .carta-cara, .carta-cruz { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border-radius: 8px; box-sizing: border-box; padding: 10px; font-size:0.7em; text-align:center;}
        .carta-cruz { background: #0056b3; color: white; background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.1) 10px, rgba(255,255,255,0.1) 20px); border: 2px solid #004494;}
        .carta-cara { background: #fff; color: #333; transform: rotateY(180deg); border: 2px solid #17a2b8; box-shadow: inset 0 0 10px rgba(0,0,0,0.1);}

        /* Gravedad */
        #cielo-gravedad { position: relative; flex-grow: 1; border: 1px solid #ccc; background: #fafafa; overflow: hidden; margin-bottom: 10px; border-radius:6px; min-height:300px;}
        .palabra-cayendo { position: absolute; padding: 5px 10px; background: #ffc107; border-radius: 4px; font-weight: bold; white-space: nowrap; transition: top 0.1s linear; }

        /* Whack-a-mole */
        .hueco-mole { display:inline-block; min-width:80px; height:30px; border-bottom:2px solid #333; margin:0 5px; vertical-align: bottom; position:relative; overflow:visible;}
        .mole-intruso { position:absolute; bottom:0; left:0; width:100%; background:#dc3545; color:white; text-align:center; border-radius:4px; font-size:0.9em; padding:2px 0; cursor:pointer; font-weight:bold; z-index:10; animation: moleUp 0.2s ease-out;}
        @keyframes moleUp { 0% { bottom:-20px; opacity:0; } 100% { bottom:0; opacity:1; } }

        /* Tracking Periférico */
        .grid-periferico { display: grid; grid-template-columns: 1fr 20px 1fr; gap: 10px; align-items: center; height: 100px;}
        .punto-fijacion { width: 10px; height: 10px; background: red; border-radius: 50%; margin: 0 auto; animation: latido 1s infinite;}
        @keyframes latido { 0% { transform: scale(1); } 50% { transform: scale(1.5); } 100% { transform: scale(1); } }

        /* ====================================================
           ADAPTACIÓN RESPONSIVE EXTREMA (MÓVILES)
           ==================================================== */
        
        button, select, .palabra-draggable, .carta-mem, .z-item, .hueco-mole {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        @media (max-width: 900px) { 
            body { padding: 10px; }
            .contenedor { padding: 15px; }
            
            .layout-principal { display: flex; flex-direction: column-reverse; }
            
            #area-trabajo { padding: 15px; min-height: 50vh; }
            .panel-fases { max-height: none; overflow: visible; padding-right: 0;}
            
            .cabecera-controles { flex-direction: column; align-items: stretch; }
            .controles-izq { display: flex; width: 100%; }
            .controles-izq select { flex-grow: 1; }

            .hud-juego { flex-wrap: wrap; gap: 5px; justify-content: center; }
            .grid-memorama { grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px; }
            .carta-cara { font-size: 0.8em !important; padding: 5px !important; }
            .carta-cruz { font-size: 1.5em !important; }
            #bomb-timer { font-size: 3em !important; }
            #visor-fijacion { font-size: 1.1em !important; }
            .ruleta-visor { font-size: 3em !important; }
        }
    </style>
</head>
<body>

<div class="contenedor">
    <div class="cabecera-controles">
        <div id="cita-actual">Seleccione un versículo</div>
        <div class="controles-izq">
            <select id="selector-versiculo"></select>
            <button id="btn-reintentar" disabled>↻ Reintentar</button>
        </div>
    </div>

    <div class="layout-principal">
        <div class="panel-fases">
            <div class="columna-fase rec" id="menu-fase-1"><h3>👁️ I. Reconocimiento visual</h3></div>
            <div class="columna-fase prod" id="menu-fase-2"><h3>🧠 II. Producción de enlaces</h3></div>
            <div class="columna-fase dom" id="menu-fase-3"><h3>👑 III. Dominio absoluto</h3></div>
        </div>

        <div id="area-trabajo">
            <div style="text-align:center; color:#666; margin-top:50px;">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                <h2>Motor de entrenamiento activo</h2>
                <p>Seleccione una técnica en el panel inferior para comenzar el desafío.</p>
            </div>
        </div>
    </div>
</div>

<script src="versomemo.js"></script> 
<script>
    // ==========================================
    // NÚCLEO LÓGICO Y ESTADO
    // ==========================================
    const Validacion = {
        normalizar: (texto) => texto.toLowerCase().replace(/[^a-z0-9ñáéíóú]/g, ''),
        comparar: (input, objetivo) => Validacion.normalizar(input) === Validacion.normalizar(objetivo),
        extraerPalabras: (texto) => texto.split(/[\s]+/).filter(w => w.length > 0)
    };

    const EstadoApp = {
        versiculo: null,
        intervalos: [], 
        estrategiaActiva: null,
        datosTemporales: {},
        persistencia: {}, 
        
        limpiar: function() {
            this.intervalos.forEach(clearInterval);
            this.intervalos = [];
            this.datosTemporales = {};
            let area = document.getElementById('area-trabajo');
            area.innerHTML = '';
            area.className = ''; 
        },
        
        registrarIntervalo: function(id) { this.intervalos.push(id); return id; }
    };

    const renderDual = (v, fn = (x)=>x) => `<div class="cita">${fn(v.cita)}</div><div class="texto">${fn(v.texto)}</div>`;
    
    const crearHUD = (vidas = 3) => {
        EstadoApp.datosTemporales.vidas = vidas;
        EstadoApp.datosTemporales.maxVidas = vidas;
        EstadoApp.datosTemporales.combo = 0;
        return `<div class="hud-juego">
                    <div>❤️ Vidas: <span id="hud-vidas">${'🔴'.repeat(vidas)}</span></div>
                    <div id="hud-mensaje">¡Preparado!</div>
                    <div>🔥 Combo: <span id="hud-combo">0</span>x</div>
                </div>`;
    };

    const actualizarHUD = (acierto, msg = "") => {
        let hVidas = document.getElementById('hud-vidas');
        let hCombo = document.getElementById('hud-combo');
        let hMsg = document.getElementById('hud-mensaje');
        if(!hVidas) return true;

        let limiteAbsoluto = 5;

        if(acierto) {
            EstadoApp.datosTemporales.combo++;
            let comboActual = EstadoApp.datosTemporales.combo;
            
            hCombo.textContent = comboActual;
            hCombo.style.color = comboActual > 2 ? '#ffc107' : 'white';
            
            if(comboActual > 0 && comboActual % 10 === 0 && EstadoApp.datosTemporales.vidas < limiteAbsoluto) {
                EstadoApp.datosTemporales.vidas++;
                hMsg.textContent = "🔥 ¡Combo! +1 vida ❤️";
                hMsg.style.color = '#ffc107';
                
                let vActuales = Math.max(0, EstadoApp.datosTemporales.vidas);
                hVidas.textContent = '🔴'.repeat(vActuales); 
                
                hVidas.style.animation = 'popIn 0.3s ease-out';
                setTimeout(() => hVidas.style.animation = 'none', 300);
            } else {
                hMsg.textContent = msg || "¡Bien!"; 
                hMsg.style.color = '#28a745';
            }
            return true;
        } else {
            EstadoApp.datosTemporales.vidas--;
            EstadoApp.datosTemporales.combo = 0;
            hCombo.textContent = "0"; hCombo.style.color = 'white';
            
            let vActuales = Math.max(0, EstadoApp.datosTemporales.vidas);
            let maxHistorico = Math.max(EstadoApp.datosTemporales.maxVidas || 3, vActuales + 1);
            let vPerdidas = Math.max(0, maxHistorico - vActuales);
            hVidas.textContent = '🔴'.repeat(vActuales) + '⚫'.repeat(vPerdidas);
            
            hMsg.textContent = msg || "¡Fallo!"; hMsg.style.color = '#dc3545';
            
            if(EstadoApp.datosTemporales.vidas <= 0) {
                hMsg.textContent = "☠️ ¡Fin del juego!";
                return false; 
            }
            return true;
        }
    };

    const crearBarraTiempo = () => `<div class="barra-tiempo"><div class="barra-tiempo-fill" id="barra-fill"></div></div>`;
    const bancoDistractores = ["espíritu", "ley", "pecado", "cielo", "tierra", "promesa", "sangre", "templo", "paz", "gracia", "verdad", "luz", "tinieblas", "justicia", "muerte", "vida", "carne", "gloria", "fe", "esperanza", "amor", "castigo", "salvación", "fuego", "agua", "mundo", "hombre", "mujer", "niño", "camino", "verdad", "puerta"];

    // ==========================================
    // DICCIONARIO DE ESTRATEGIAS (55 TÉCNICAS)
    // ==========================================
    const DiccionarioEstrategias = {
        fase1_Reconocimiento: [
            { nombre: "1. Lectura normal", render: (dom, v) => dom.innerHTML = renderDual(v) },
            { nombre: "2. Audio narrador", render: (dom, v) => { dom.innerHTML = `<button id="btn-hablar" style="margin-bottom:15px;">▶️ Reproducir audio</button>${renderDual(v)}`; document.getElementById('btn-hablar').onclick = () => window.speechSynthesis.speak(new SpeechSynthesisUtterance(`${v.cita}. ${v.texto}`)); } },
            { nombre: "3. Lectura rápida (niveles)", render: (dom, v) => { 
                EstadoApp.persistencia.nivelRSVP = EstadoApp.persistencia.nivelRSVP || 1;
                let nivel = EstadoApp.persistencia.nivelRSVP;
                let velocidad = Math.max(80, 450 - (nivel * 70));
                const p = (`${v.cita} ${v.texto}`).split(' '); 
                
                dom.innerHTML = `<div style="text-align:center; margin-bottom:10px; color:#0056b3; font-weight:bold;">Nivel de agilidad: ${nivel}/5</div>
                                 <div id="rsvp" style="font-size:2.5em;text-align:center;padding:40px; min-height:90px; background:#f8f9fa; border-radius:8px; margin-bottom:15px;">👀</div>
                                 <button id="btn-rsvp" style="width:100%; padding:15px; font-size:1.1em;">Iniciar entrenamiento ocular</button>`; 
                
                document.getElementById('btn-rsvp').onclick = (e) => { 
                    e.target.disabled = true; let i = 0; 
                    let timerId = setInterval(() => { 
                        if (i < p.length) {
                            let word = p[i++];
                            let mid = Math.floor(word.length/2);
                            if(word.length > 2) { word = `<span>${word.slice(0,mid)}</span><strong style="color:#dc3545;">${word[mid]}</strong><span>${word.slice(mid+1)}</span>`; }
                            let rsvpDOM = document.getElementById('rsvp');
                            if(rsvpDOM) rsvpDOM.innerHTML = word; 
                        } else { 
                            clearInterval(timerId);
                            let rsvpDOM = document.getElementById('rsvp');
                            if(rsvpDOM) rsvpDOM.textContent = "Fin"; 
                            e.target.disabled = false; 
                            if(nivel < 5) {
                                e.target.textContent = "Avanzar al siguiente nivel (+ velocidad)";
                                e.target.onclick = () => { EstadoApp.persistencia.nivelRSVP++; document.getElementById('btn-reintentar').click(); };
                            } else { 
                                e.target.textContent = "Nivel máximo alcanzado 🏆"; e.target.disabled = true;
                            }
                        } 
                    }, velocidad);
                    EstadoApp.registrarIntervalo(timerId);
                }; 
            } },
            { nombre: "4. Bloques semánticos", render: (dom, v) => { 
                const fragFn = (t) => '<div style="display:flex; flex-direction:column; gap:10px; margin-top:10px;">' + t.split(/[,;.]/).filter(f=>f.trim()!=='').map((f, idx) => `<div style="background:#e9ecef; padding:12px; border-left:5px solid #17a2b8; font-size:1.1em; border-radius:0 6px 6px 0;">${f.trim()}</div>`).join('') + '</div>';
                dom.innerHTML = renderDual(v, fragFn);
            } },
            { nombre: "5. Palabras clave (subconsciente)", render: (dom, v) => dom.innerHTML = renderDual(v, t => t.split(' ').map(p => Validacion.normalizar(p).length > 4 ? `<strong><mark style="background:#fff3cd; padding:2px 4px; border-radius:3px;">${p}</mark></strong>` : `<span style="opacity:0.6">${p}</span>`).join(' ')) },
            { nombre: "6. Restauración de vocales (secuencia)", render: (dom, v) => { 
                let t = `${v.cita} ${v.texto}`;
                let missing = [];
                let html = "";
                let idx = 0;
                
                for(let i=0; i<t.length; i++) {
                    let c = t[i];
                    if(/[aeiouáéíóúüAEIOUÁÉÍÓÚÜ]/.test(c)) {
                        missing.push({ char: c, id: idx });
                        html += `<span id="miss-v-${idx}" style="border-bottom:3px solid #17a2b8; color:transparent; transition:all 0.2s;">${c}</span>`;
                        idx++;
                    } else {
                        html += `<span>${c}</span>`;
                    }
                }

                dom.innerHTML = crearHUD(3) + `
                    <p style="text-align:center; color:#555; margin-top:0;">El texto perdió sus vocales. Escríbelas en orden exacto para restaurarlo.</p>
                    <div style="font-size:1.3em; line-height:1.8; background:#fff; padding:20px; border-radius:8px; border:2px dashed #17a2b8; margin-bottom:15px; box-shadow:inset 0 0 10px rgba(0,0,0,0.05); color:#333;">${html}</div>
                    <input type="text" id="in-restore-v" placeholder="SIGUIENTE VOCAL..." autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" style="width:100%; box-sizing:border-box; text-align:center; font-size:1.5em; padding:15px; border:3px solid #17a2b8; border-radius:8px; outline:none; text-transform:uppercase; letter-spacing: 2px;">
                    <div id="res-restore-v" class="feedback-banner"></div>
                `;

                let curr = 0;
                let input = document.getElementById('in-restore-v');
                let res = document.getElementById('res-restore-v');
                let juegoActivo = true;

                setTimeout(() => input.focus(), 100);

                input.addEventListener('input', (e) => {
                    if(!juegoActivo) return;
                    let val = e.target.value.slice(-1).toLowerCase();
                    input.value = ""; 
                    
                    if(!/[aeiouü]/.test(val)) return; 

                    let target = missing[curr];
                    let targetNorm = target.char.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

                    if(val === targetNorm) {
                        actualizarHUD(true, "¡Conexión!");
                        let span = document.getElementById(`miss-v-${curr}`);
                        span.style.color = '#28a745';
                        span.style.borderColor = 'transparent';
                        span.style.textShadow = '0 0 10px #28a745';
                        setTimeout(() => span.style.textShadow = 'none', 300);
                        
                        curr++;
                        if(curr === missing.length) {
                            juegoActivo = false;
                            input.disabled = true;
                            res.innerHTML = '<span class="correcto">🎯 ¡Restauración completa!</span>';
                            res.style.display = 'block';
                            res.style.background = '#d4edda';
                        }
                    } else {
                        let vivo = actualizarHUD(false, "Vocal incorrecta");
                        input.style.background = '#f8d7da';
                        setTimeout(() => { if(juegoActivo) input.style.background = '#fff'; }, 200);
                        if(!vivo) {
                            juegoActivo = false;
                            input.disabled = true;
                            res.innerHTML = '<span class="incorrecto">☠️ Secuencia colapsada.</span>';
                            res.style.display = 'block';
                            res.style.background = '#f8d7da';
                        }
                    }
                });
            } },
            { nombre: "7. Restauración de consonantes (secuencia)", render: (dom, v) => { 
                let t = `${v.cita} ${v.texto}`;
                let missing = [];
                let html = "";
                let idx = 0;
                
                for(let i=0; i<t.length; i++) {
                    let c = t[i];
                    if(/[bcdfghjklmnñpqrstvwxyzBCDFGHJKLMNÑPQRSTVWXYZ]/.test(c)) {
                        missing.push({ char: c, id: idx });
                        html += `<span id="miss-c-${idx}" style="border-bottom:3px solid #ffc107; color:transparent; transition:all 0.2s;">${c}</span>`;
                        idx++;
                    } else {
                        html += `<span>${c}</span>`;
                    }
                }

                dom.innerHTML = crearHUD(3) + `
                    <p style="text-align:center; color:#555; margin-top:0;">El texto perdió sus consonantes. Escríbelas en orden exacto para restaurarlo.</p>
                    <div style="font-size:1.3em; line-height:1.8; background:#fff; padding:20px; border-radius:8px; border:2px dashed #ffc107; margin-bottom:15px; box-shadow:inset 0 0 10px rgba(0,0,0,0.05); color:#333;">${html}</div>

            { nombre: "39. Duelo de clones (mutaciones sutiles)", render: (dom, v) => {
                const rawWords = Validacion.extraerPalabras(v.texto);
                const cita = v.cita;

                dom.innerHTML = crearHUD(3) + crearBarraTiempo() + `
                    <p style="text-align:center; color:#555; margin-top:0;">Fase de dominio: identifica la versión <strong>exacta y pura</strong>.</p>
                    <div id="clones-container" style="display:flex; flex-direction:column; gap:12px; margin-top:10px;"></div>

                let container = document.getElementById('clones-container');
                let resDom = document.getElementById('res-clones');

                let timerId = null;

                    let match = str.match(/^([^a-zA-ZáéíóúÁÉÍÓÚñÑ]*)([a-zA-ZáéíóúÁÉÍÓÚñÑ]+)(.*)$/);
                    if(match) return { pre: match[1], core: match[2], post: match[3] };
                    return { pre: "", core: str, post: "" }; 
                };

                const aplicarMutacion = (words) => {
                    let mutable = [...words];
                    let tipo = Math.floor(Math.random() * 4);
                    
                    switch(tipo) {
                        case 0: 
                            if (mutable.length > 3) {
                                let idx = Math.floor(Math.random() * (mutable.length - 1));
                                let p1 = extraerPartes(mutable[idx]);
                                let p2 = extraerPartes(mutable[idx+1]);
                                mutable[idx] = p1.pre + p2.core + p1.post;
                                mutable[idx+1] = p2.pre + p1.core + p2.post;
                            }
                            break;
                        
                        case 1: 
                            let i = Math.floor(Math.random() * mutable.length);
                            let j = Math.floor(Math.random() * mutable.length);
                            if (i !== j) {
                                let pDest = extraerPartes(mutable[i]);
                                let pSrc = extraerPartes(mutable[j]);
                                if (pSrc.core.length > 3) {
                                    mutable[i] = pDest.pre + pSrc.core.toLowerCase() + pDest.post;
                                }
                            }

                        case 2: 
                            const conectores = ["y", "que", "el", "de", "a", "la", "en", "os", "su", "mi", "se", "lo"];

                                let p = extraerPartes(mutable[idxLong]);

            { nombre: "51. Gravedad letal (múltiple y rápida)", render: (dom, v) => {
                let p = Validacion.extraerPalabras(`${v.cita} ${v.texto}`);
                dom.innerHTML= crearHUD(3) + `<div id="cielo-gravedad"></div><input type="text" id="input-grav" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" inputmode="text" style="width:100%; box-sizing:border-box; border:3px solid #0056b3; font-size:1.5em; padding:15px; text-align:center; margin-top:10px;" placeholder="Destruye las palabras antes de que toquen el suelo...">`;
                
                let cielo = document.getElementById('cielo-gravedad');
                let input = document.getElementById('input-grav');
                
                let idxP = 0; 
                let palabrasActivas = []; 
                let juegoActivo = true;
                let gameLoopId = null;
                let spawnId = null;
                
                setTimeout(() => input.focus(), 100);
                
                gameLoopId = EstadoApp.registrarIntervalo(setInterval(() => {
                    if (!juegoActivo) return;
                    
                    for (let i = palabrasActivas.length - 1; i >= 0; i--) {
                        let obj = palabrasActivas[i];
                        obj.pos += obj.vel;
                        obj.el.style.top = `${obj.pos}px`;
                        
                        if (obj.pos > cielo.offsetHeight - 40) {
                            obj.el.style.background = '#dc3545';
                            obj.el.style.color = 'white';
                            let ref = obj.el;
                            setTimeout(() => { if (ref && ref.parentNode) ref.remove(); }, 300);
                            
                            palabrasActivas.splice(i, 1);
                            input.value = "";
                            
                            if (!actualizarHUD(false, "¡Impacto!")) {
                                juegoActivo = false;
                                clearInterval(gameLoopId);
                                clearTimeout(spawnId);
                                input.disabled = true;
                                cielo.innerHTML = '<div style="text-align:center; margin-top:100px; font-size:2.5em; color:#dc3545; font-weight:bold;">Fin del juego<br><span style="font-size:0.5em; color:#666;">El texto te aplastó.</span></div>';
                            }
                        }
                    }
                    
                    if (idxP >= p.length && palabrasActivas.length === 0 && juegoActivo) {
                        juegoActivo = false;
                        clearInterval(gameLoopId);
                        clearTimeout(spawnId);
                        input.disabled = true;
                        EstadoApp.limpiar(); 
                        document.getElementById('area-trabajo').innerHTML = '<div style="text-align:center; margin-top:100px; font-size:2.5em; color:#28a745; font-weight:bold;">¡Victoria!<br><span style="font-size:0.5em; color:#666;">Dominaste la avalancha léxica.</span></div>';
                    }
                }, 30));

                let spawnWord = () => {
                    if (!juegoActivo || idxP >= p.length) return;
                    
                    let w = p[idxP];
                    let el = document.createElement('div'); 
                    el.className = 'palabra-cayendo'; 
                    el.textContent = w;
                    el.style.left = `${Math.random() * 70 + 10}%`; 
                    el.style.top = `-40px`;
                    el.style.transition = 'transform 0.1s, opacity 0.2s'; 
                    cielo.appendChild(el);
                    
                    let multiplicadorProgreso = idxP / p.length;
                    let velocidadCaida = 1.2 + (multiplicadorProgreso * 2.5) + Math.random(); 
                    
                    palabrasActivas.push({ el: el, txt: Validacion.normalizar(w), pos: -40, vel: velocidadCaida });
                    idxP++;
                    
                    let tiempoEntrePalabras = 1800 - (multiplicadorProgreso * 1300); 
                    spawnId = EstadoApp.registrarIntervalo(setTimeout(spawnWord, Math.max(500, tiempoEntrePalabras)));
                };
                
                spawnId = EstadoApp.registrarIntervalo(setTimeout(spawnWord, 500));
                
                input.addEventListener('input', (e) => {
                    if (!juegoActivo) return;
                    let val = Validacion.normalizar(e.target.value);
                    
                    let matchIdx = -1;
                    let maxPos = -999;
                    
                    for (let i = 0; i < palabrasActivas.length; i++) {
                        if (palabrasActivas[i].txt === val) {
                            if (palabrasActivas[i].pos > maxPos) {
                                maxPos = palabrasActivas[i].pos;
                                matchIdx = i;
                            }
                        }
                    }
                    
                    if (matchIdx !== -1) {
                        let obj = palabrasActivas[matchIdx];
                        palabrasActivas.splice(matchIdx, 1); 
                        
                        obj.el.style.background = '#28a745'; 
                        obj.el.style.color = 'white'; 
                        obj.el.style.transform = 'scale(1.5)'; 
                        obj.el.style.opacity = '0';
                        
                        let ref = obj.el;
                        setTimeout(()=> { if (ref && ref.parentNode) ref.remove(); }, 200);
                        
                        e.target.value = ""; 
                        actualizarHUD(true, "¡Destruida!"); 
                    }
                });
            } },
            { nombre: "52. Visión periférica extrema", render: (dom, v) => {
                let p = Validacion.extraerPalabras(`${v.cita} ${v.texto}`);
                dom.innerHTML = `<p style="text-align:center;">Fije sus ojos <strong>estrictamente en el punto rojo</strong>. Lea las palabras usando solo su visión periférica lateral.</p>
                                 <div class="grid-periferico" style="background:#111; padding:30px; border-radius:8px; margin-bottom:15px;">
                                    <div id="peri-izq" style="color:white; font-size:2em; text-align:right; padding-right:20px;"></div>
                                    <div class="punto-fijacion"></div>
                                    <div id="peri-der" style="color:white; font-size:2em; text-align:left; padding-left:20px;"></div>
                                 </div>
                                 <button id="btn-peri" style="width:100%; padding:15px; background:#e67e22;">Comenzar destellos</button>`;
                document.getElementById('btn-peri').onclick = (e) => {
                    e.target.disabled = true; let i = 0; let izq = document.getElementById('peri-izq'); let der = document.getElementById('peri-der');
                    EstadoApp.registrarIntervalo(setInterval(()=>{
                        izq.textContent = ""; der.textContent = "";
                        if(i >= p.length) { EstadoApp.limpiar(); e.target.disabled=false; e.target.textContent="Prueba finalizada"; return; }
                        setTimeout(()=>{
                            izq.textContent = p[i] || ""; der.textContent = p[i+1] || ""; i+=2;
                        }, 200); 
                    }, 1200));
                };
            } },
            { nombre: "53. Interceptor ortográfico (precisión)", render: (dom, v) => {
                let pArr = Validacion.extraerPalabras(v.texto).filter(w => Validacion.normalizar(w).length > 5);
                let oculta = pArr[Math.floor(Math.random()*pArr.length)];
                if(!oculta) { dom.innerHTML="<p style='text-align:center;'>El versículo no contiene palabras suficientemente largas para este desafío.</p>"; return; }
                
                let normalizada = Validacion.normalizar(oculta);
                let displayWord = '_'.repeat(normalizada.length);
                
                dom.innerHTML = crearHUD(3) + `
                    <div style="padding:20px; background:#f8f9fa; border-radius:8px; font-size:1.2em; line-height:1.6; margin-bottom:20px; color:#555; box-shadow:inset 0 0 10px rgba(0,0,0,0.05);">
                        ${v.texto.replace(oculta, `<span style="background:#ffc107; padding:2px 10px; border-radius:4px; font-weight:bold; letter-spacing:5px; color:#000; transition:all 0.3s;" id="hueco-interceptor">${displayWord}</span>`)}
                    </div>
                    <p style="text-align:center; margin:0 0 15px 0; color:#666;">Selecciona la letra correcta para ensamblar la palabra oculta:</p>
                    <div id="teclado-interceptor" style="display:grid; grid-template-columns:1fr 1fr; gap:12px; max-width:300px; margin:0 auto;"></div>
                    <div id="res-interceptor" class="feedback-banner"></div>
                `;
                
                let hueco = document.getElementById('hueco-interceptor');
                let teclado = document.getElementById('teclado-interceptor');
                let resDom = document.getElementById('res-interceptor');
                let charIdx = 0;
                let juegoActivo = true;
                let abcd = "abcdefghijklmnopqrstuvwxyzáéíóúñ";

                const generarTeclas = () => {
                    teclado.innerHTML = "";
                    if(!juegoActivo) return;
                    
                    let letraCorrecta = normalizada[charIdx];
                    let opciones = [letraCorrecta];
                    
                    // Llenar con 3 distractores aleatorios
                    while(opciones.length < 4) {
                        let r = abcd[Math.floor(Math.random()*abcd.length)];
                        if(!opciones.includes(r)) opciones.push(r);
                    }
                    
                    // Barajar los botones
                    opciones.sort(() => Math.random() - 0.5);
                    
                    opciones.forEach(letra => {
                        let btn = document.createElement('button');
                        btn.style.cssText = "padding:20px; font-size:1.8em; font-family:monospace; background:#0056b3; color:white; border:none; border-radius:8px; box-shadow:0 4px 0 #004494; text-transform:uppercase; font-weight:bold; cursor:pointer; touch-action:manipulation; transition:transform 0.1s, background 0.2s;";
                        btn.textContent = letra;
                        
                        btn.addEventListener('touchstart', () => { if(juegoActivo && !btn.disabled) btn.style.transform = 'translateY(4px)'; }, {passive: true});
                        btn.addEventListener('touchend', () => { if(juegoActivo && !btn.disabled) btn.style.transform = 'translateY(0)'; }, {passive: true});
                        btn.addEventListener('mousedown', () => { if(juegoActivo && !btn.disabled) btn.style.transform = 'translateY(4px)'; });
                        btn.addEventListener('mouseup', () => { if(juegoActivo && !btn.disabled) btn.style.transform = 'translateY(0)'; });

                        btn.onclick = () => {
                            if(!juegoActivo || btn.disabled) return;
                            
                            if(letra === letraCorrecta) {
                                actualizarHUD(true, "¡Letra correcta!");
                                
                                // Actualizar el texto visual
                                let actualStr = hueco.textContent.split('');
                                actualStr[charIdx] = letraCorrecta.toUpperCase();
                                hueco.textContent = actualStr.join('');
                                
                                charIdx++;
                                
                                if(charIdx === normalizada.length) {
                                    // Palabra terminada
                                    juegoActivo = false;
                                    teclado.innerHTML = "";
                                    hueco.style.background = "#28a745";
                                    hueco.style.color = "white";
                                    hueco.style.letterSpacing = "2px";
                                    
                                    resDom.innerHTML = '<span class="correcto">🎯 ¡Palabra completada con éxito!</span>';
                                    resDom.style.display = 'block';
                                    resDom.style.background = '#d4edda';
                                } else {
                                    // Siguiente letra
                                    generarTeclas();
                                }
                            } else {
                                let vivo = actualizarHUD(false, "¡Letra equivocada!");
                                btn.style.background = '#dc3545';
                                btn.style.boxShadow = '0 4px 0 #a71d2a';
                                btn.disabled = true;
                                
                                setTimeout(() => {
                                    if(juegoActivo && btn) {
                                        btn.style.background = '#0056b3';
                                        btn.style.boxShadow = '0 4px 0 #004494';
                                        btn.disabled = false;
                                    }
                                }, 400);
                                
                                if(!vivo) {
                                    juegoActivo = false;
                                    teclado.innerHTML = "";
                                    hueco.style.background = "#dc3545";
                                    hueco.style.color = "white";
                                    
                                    resDom.innerHTML = '<span class="incorrecto">☠️ Ortografía fallida. Sistema bloqueado.</span>';
                                    resDom.style.display = 'block';
                                    resDom.style.background = '#f8d7da';
                                }
                            }
                        };
                        teclado.appendChild(btn);
                    });
                };
                
                generarTeclas();
            } },
            { nombre: "54. Matriz de fijación (patrón Z)", render: (dom, v) => {
                let p = Validacion.extraerPalabras(`${v.cita} ${v.texto}`);
                let rejilla = "";
                for(let i=0; i<p.length; i+=4) {
                    let fila = p.slice(i, i+4);
                    while(fila.length < 4) fila.push(""); 
                    rejilla += `<div style="display:grid; grid-template-columns:1fr 1fr 1fr 1fr; text-align:center; padding:15px 0; border-bottom:1px solid #eee;">
                        <span class="z-item" style="color:transparent; transition:color 0.2s;">${fila[0]}</span>
                        <span class="z-item" style="color:transparent; transition:color 0.2s;">${fila[1]}</span>
                        <span class="z-item" style="color:transparent; transition:color 0.2s;">${fila[2]}</span>
                        <span class="z-item" style="color:transparent; transition:color 0.2s;">${fila[3]}</span>
                    </div>`;
                }
                dom.innerHTML = `<p>Siga el rastro iluminado leyendo en Z sin mover la cabeza.</p><div style="background:#fff; border:1px solid #ccc; border-radius:8px; padding:10px;">${rejilla}</div><button id="btn-z" style="width:100%; margin-top:15px; padding:15px;">Activar escáner Z</button>`;
                
                document.getElementById('btn-z').onclick = (e) => {
                    e.target.disabled = true; let items = document.querySelectorAll('.z-item'); let i = 0;
                    EstadoApp.registrarIntervalo(setInterval(()=>{
                        items.forEach(it=>it.style.color = 'transparent');
                        if(i < items.length) { items[i].style.color = '#0056b3'; items[i].style.fontWeight = 'bold'; i++; }
                        else { EstadoApp.limpiar(); e.target.textContent="Escaneo terminado"; }
                    }, 300));
                };
            } },
            { nombre: "55. Desactivación de bomba (código secreto)", render: (dom, v) => {
                let t = `${v.cita} ${v.texto}`;
                let normalizado = Validacion.normalizar(t);
                let displayHTML = "";
                
                for(let i=0; i<t.length; i++) {
                    let char = t[i];
                    if (/[a-zA-ZáéíóúÁÉÍÓÚñÑ0-9]/.test(char)) {
                        let isPista = Math.random() > 0.85;
                        displayHTML += `<span id="bomb-char-${i}" style="border-bottom:2px solid #555; margin:0 2px; width:15px; display:inline-block; text-align:center; color:${isPista ? '#ffc107' : 'transparent'}; font-family:monospace; font-weight:bold; transition:all 0.1s;">${char.toUpperCase()}</span>`;
                    } else {
                        displayHTML += `<span style="margin:0 2px; color:#888;">${char}</span>`;
                    }
                }

                let baseTime = Math.max(20, Math.floor(normalizado.length * 0.4));
                
                dom.innerHTML = `
                    <div style="background:#111; padding:30px; border-radius:12px; border:4px solid #333; box-shadow:inset 0 0 50px rgba(0,0,0,0.8), 0 10px 20px rgba(0,0,0,0.3); text-align:center; position:relative; overflow:hidden;">
                        <div class="ruido-visual" style="opacity:0.3;"></div>
                        <div style="color:#dc3545; font-family:monospace; font-size:1.2em; font-weight:bold; letter-spacing:3px; margin-bottom:15px;">>>> Alerta de sistema <<<</div>
                        <div id="bomb-timer" style="font-family:monospace; font-size:5em; font-weight:bold; color:#dc3545; text-shadow:0 0 15px #dc3545, 0 0 5px #dc3545; margin-bottom:20px; line-height:1;">00:${baseTime.toString().padStart(2, '0')}</div>
                        
                        <div style="background:#222; padding:20px; border-radius:6px; border:1px solid #444; margin-bottom:20px; line-height:2.5; font-size:1.3em;">
                            ${displayHTML}
                        </div>
                        
                        <p style="color:#aaa; font-size:0.9em; margin-bottom:10px;">Introduce el código de desactivación exacto.</p>
                        <input type="text" id="bomb-input" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" inputmode="text" style="width:100%; background:#000; color:#0f0; font-family:monospace; font-size:1.5em; padding:15px; border:2px solid #0f0; outline:none; text-align:center; text-transform:uppercase; box-shadow:0 0 10px rgba(0,255,0,0.2);" placeholder="_">
                        <div id="res-bomba" style="margin-top:15px; font-weight:bold; font-size:1.2em; display:none;"></div>
                    </div>
                `;

                let timerDOM = document.getElementById('bomb-timer');
                let inputDOM = document.getElementById('bomb-input');
                let resDOM = document.getElementById('res-bomba');
                let tiempoRestante = baseTime;
                let juegoActivo = true;
                
                setTimeout(() => inputDOM.focus(), 100);

                let actualizaTimer = () => {
                    let min = Math.floor(tiempoRestante / 60);
                    let sec = tiempoRestante % 60;
                    timerDOM.textContent = `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
                    if (tiempoRestante <= 10) timerDOM.style.animation = 'latido 0.5s infinite';
                };

                let timerId = EstadoApp.registrarIntervalo(setInterval(() => {
                    if(!juegoActivo) return;
                    tiempoRestante--;
                    actualizaTimer();
                    
                    if(tiempoRestante <= 0) {
                        juegoActivo = false;
                        clearInterval(timerId);
                        inputDOM.disabled = true;
                        timerDOM.textContent = "00:00";
                        timerDOM.style.animation = 'none';
                        document.querySelector('div[style*="background:#111"]').style.background = '#300000';
                        resDOM.innerHTML = '<span class="incorrecto">💥 Detonación.</span>';
                        resDOM.style.display = 'block';
                    }
                }, 1000));

                let normalizadoIdx = 0; 
                
                inputDOM.addEventListener('input', (e) => {
                    if(!juegoActivo) return;
                    let val = e.target.value;
                    if(val.length === 0) return;
                    
                    let ultimaLetraIn = val.slice(-1).toLowerCase().replace(/[^a-z0-9ñáéíóú]/g, '');
                    if(ultimaLetraIn === "") { e.target.value = ""; return; }

                    if(ultimaLetraIn === normalizado[normalizadoIdx]) {
                        let rawIdx = 0; let normCounter = 0;
                        while(rawIdx < t.length) {
                            if(/[a-zA-ZáéíóúÁÉÍÓÚñÑ0-9]/.test(t[rawIdx])) {
                                if(normCounter === normalizadoIdx) break;
                                normCounter++;
                            }
                            rawIdx++;
                        }
                        
                        let spanTarget = document.getElementById(`bomb-char-${rawIdx}`);
                        if(spanTarget) {
                            spanTarget.style.color = '#0f0';
                            spanTarget.style.textShadow = '0 0 8px #0f0';
                            spanTarget.style.borderColor = '#0f0';
                        }
                        
                        normalizadoIdx++;
                        e.target.value = ""; 
                        
                        if(normalizadoIdx === normalizado.length) {
                            juegoActivo = false;
                            clearInterval(timerId);
                            inputDOM.disabled = true;
                            timerDOM.style.color = '#28a745';
                            timerDOM.style.textShadow = '0 0 15px #28a745';
                            timerDOM.style.animation = 'none';
                            resDOM.innerHTML = '<span class="correcto">✅ Código aceptado.</span>';
                            resDOM.style.display = 'block';
                        }
                    } else {
                        tiempoRestante = Math.max(0, tiempoRestante - 2);
                        actualizaTimer();
                        inputDOM.style.background = '#500';
                        setTimeout(() => { if(juegoActivo) inputDOM.style.background = '#000'; }, 150);
                        e.target.value = ""; 
                    }
                });
            } }
        ]
    };

    function inicializar() {
        const selector = document.getElementById('selector-versiculo');
        const citaDOM = document.getElementById('cita-actual');
        const btnReintentar = document.getElementById('btn-reintentar');

        if(typeof versiculos !== 'undefined' && versiculos.length > 0) {
            versiculos.forEach((v, index) => {
                let option = document.createElement('option');
                option.value = index; option.textContent = `${v.semana} - ${v.cita}`;
                selector.appendChild(option);
            });
            EstadoApp.versiculo = versiculos[0];
            citaDOM.textContent = EstadoApp.versiculo.cita;
        } else {
            citaDOM.textContent = "Error: versomemo.js no encontrado o base de datos vacía.";
        }

        selector.addEventListener('change', (e) => {
            EstadoApp.versiculo = versiculos[e.target.value];
            citaDOM.textContent = EstadoApp.versiculo.cita;
            EstadoApp.persistencia = {};
            EstadoApp.limpiar();
            EstadoApp.estrategiaActiva = null;
            btnReintentar.disabled = true;
            document.getElementById('area-trabajo').innerHTML = '<div style="text-align:center; color:#666; margin-top:50px;"><svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg><h2>Nuevo versículo cargado</h2><p>Seleccione una técnica en el panel inferior para comenzar el desafío.</p></div>';
            document.querySelectorAll('.btn-tecnica').forEach(b => b.classList.remove('activo'));
        });
        
        btnReintentar.onclick = () => {
            if(EstadoApp.estrategiaActiva) {
                EstadoApp.limpiar();
                EstadoApp.estrategiaActiva.render(document.getElementById('area-trabajo'), EstadoApp.versiculo);
            }
        };

        const mapDom = { fase1_Reconocimiento: document.getElementById('menu-fase-1'), fase2_Produccion: document.getElementById('menu-fase-2'), fase3_Dominio: document.getElementById('menu-fase-3') };

        for (const [fase, estrategias] of Object.entries(DiccionarioEstrategias)) {
            estrategias.forEach((est) => {
                let btn = document.createElement('button');
                btn.className = 'btn-tecnica'; btn.textContent = est.nombre;
                btn.onclick = (e) => {
                    document.querySelectorAll('.btn-tecnica').forEach(b => b.classList.remove('activo')); e.target.classList.add('activo');
                    if(EstadoApp.estrategiaActiva !== est) { EstadoApp.persistencia = {}; }
                    EstadoApp.limpiar(); EstadoApp.estrategiaActiva = est; btnReintentar.disabled = false;
                    est.render(document.getElementById('area-trabajo'), EstadoApp.versiculo);
                    
                    if(window.innerWidth <= 900) {
                        document.getElementById('area-trabajo').scrollIntoView({behavior: 'smooth', block: 'start'});
                    }
                };
                mapDom[fase].appendChild(btn);
            });
        }
    }

    window.onload = inicializar;
</script>
</body>
</html>
